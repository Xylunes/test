name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 赋予 Gradle 执行权限
        run: chmod +x gradlew

      - name: 编译 Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: ValorantSens-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
